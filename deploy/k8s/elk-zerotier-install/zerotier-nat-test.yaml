apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: zerotier
  namespace: networking
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
  storageClassName: rook-ceph-block  # Uses dynamic storage provisioning

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: zerotier-auto-join
  namespace: networking
spec:
  selector:
    matchLabels:
      app: zerotier
  template:
    metadata:
      labels:
        app: zerotier
    spec:
      dnsPolicy: "None"
      dnsConfig:
        nameservers:
          - 1.1.1.1
          - 8.8.8.8

      initContainers:
        - name: network-joiner
          image: busybox
          env:
            - name: ZEROTIER_NETWORK_ID
              valueFrom:
                configMapKeyRef:
                  name: zerotier-config
                  key: network-id
          command:
            - sh
            - -c
            - "mkdir -p /mnt/networks.d && touch /mnt/networks.d/${ZEROTIER_NETWORK_ID}.conf"
          volumeMounts:
            - name: vol
              subPath: config
              mountPath: /mnt

      containers:
        - name: zerotier
          image: zyclonite/zerotier:router
          env:
            - name: ZEROTIER_NETWORK_ID
              valueFrom:
                configMapKeyRef:
                  name: zerotier-config
                  key: network-id
            - name: API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: zerotier-secret
                  key: api-token
          securityContext:
            privileged: true  # Needed for network access
            capabilities:
              add:
                - NET_ADMIN
                - NET_RAW
                - SYS_ADMIN
          resources:
            limits:
              memory: "128Mi"
              cpu: "500m"
          ports:
            - name: net
              containerPort: 9993
          volumeMounts:
            - name: vol
              subPath: config
              mountPath: /var/lib/zerotier-one
            - name: tun
              mountPath: /dev/net/tun

          lifecycle:
            postStart:
              exec:
                command:
                  - sh
                  - -c
                  - |
                    set -x  # Enable debug mode
                    LOG_FILE="/var/log/zt-approve.log"
                    RESPONSE_FILE="/var/log/zt-approve-response.log"

                    echo "Waiting for ZeroTier to initialize..." | tee -a $LOG_FILE
                    sleep 10  # Ensure ZeroTier daemon has started
                    
                    # Wait until ZeroTier assigns a node ID
                    while [ -z "$ZT_NODE_ID" ]; do
                      ZT_NODE_ID=$(zerotier-cli info | awk 'NR==1 {print $3}')
                      echo "Checking ZeroTier Node ID: $ZT_NODE_ID" | tee -a $LOG_FILE
                      sleep 5
                    done

                    echo "Detected ZeroTier Node ID: $ZT_NODE_ID" | tee -a $LOG_FILE

                    if [ -z "$ZT_NODE_ID" ]; then
                      echo "Error: ZeroTier Node ID not found!" | tee -a $LOG_FILE
                      exit 1
                    fi

                    # Auto-approve this pod's ZeroTier node ID
                    echo "Approving ZeroTier Pod: $ZT_NODE_ID" | tee -a $LOG_FILE
                    curl -v -X POST \
                      -H "Authorization: Bearer $API_TOKEN" \
                      -H "Content-Type: application/json" \
                      -d '{"config": {"authorized": true}}' \
                      "https://my.zerotier.com/api/network/$ZEROTIER_NETWORK_ID/member/$ZT_NODE_ID" \
                      2>&1 | tee -a $RESPONSE_FILE

                    # Check if approval was successful
                    if grep -q '"authorized": true' $RESPONSE_FILE; then
                      echo "✅ Auto-approval successful." | tee -a $LOG_FILE
                    else
                      echo "❌ Auto-approval FAILED. Check response logs!" | tee -a $LOG_FILE
                    fi

                    ### ⬇️ APPLY NAT CONFIGURATION HERE ⬇️ ###

                    LOG_NAT="/var/log/nat-config.log"

                    echo "Waiting for network..." | tee -a $LOG_NAT
                    sleep 5  # Ensure networking is stable

                    # Get the pod's own IP
                    POD_IP=$(hostname -i)
                    echo "Detected Pod IP: $POD_IP" | tee -a $LOG_NAT

                    # Get Kibana ClusterIP dynamically
                    KIBANA_IP=$(nslookup kibana.logging.svc.cluster.local | awk '/^Address: / { print $2 }' | tail -n1)
                    echo "Resolved Kibana IP: $KIBANA_IP" | tee -a $LOG_NAT

                    if [ -z "$KIBANA_IP" ]; then
                      echo "Error: Kibana IP not found!" | tee -a $LOG_NAT
                      exit 1
                    fi

                    iptables -t nat -A PREROUTING -d $POD_IP -p tcp --dport 5601 -j DNAT --to-destination $KIBANA_IP:5601
                    iptables -t nat -A POSTROUTING -j MASQUERADE

                    echo "✅ NAT rule applied!" | tee -a $LOG_NAT

      volumes:
        - name: vol
          persistentVolumeClaim:
            claimName: zerotier
        - name: tun
          hostPath:
            path: /dev/net/tun
            type: CharDevice

