services:
  ctfd:
    build:
      context: ../../ctfd
      args:
        PIP_INDEX_URL: ${PIP_INDEX_URL:-https://pypi.org/simple/}
        DEBIAN_MIRROR: ${DEBIAN_MIRROR:-http://deb.debian.org/debian}
    ports:
      - "${CTFD_PORT:-8000}:8000"
    environment:
      DATABASE_URL: mysql+pymysql://ctfd:ctfd@db/ctfd
      REDIS_URL: redis://cache:6379
      UPLOAD_FOLDER: /var/uploads
      LOG_FOLDER: /var/log/CTFd
      WORKERS: "1"
      ACCESS_LOG: "-"
      ERROR_LOG: "-"
      REVERSE_PROXY: "true"
      UPDATE_CHECK: "false"
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_USE_SASL: "false"
      ELASTIC_URL: http://elasticsearch:9200
      ELASTIC_USERNAME: ${ELASTIC_USERNAME:-elastic}
      ELASTIC_PASSWORD: ${ELASTIC_PASSWORD:-}
      KIBANA_URL: http://kibana:5601
      KIBANA_INTERNAL_URL: http://kibana:5601
      HIKARI_KIBANA_BASE_PATH: /hikari/kibana
      KIBANA_USERNAME: ${KIBANA_USERNAME:-elastic}
      KIBANA_PASSWORD: ${KIBANA_PASSWORD:-}
      # Optional Google OAuth — leave blank to keep federated login
      # hidden. When both are set, the login and register pages render a
      # "Entrar com Google" button next to the local username/password
      # form. See docs/AUTH.md for the operator-facing setup.
      HIKARI_GOOGLE_CLIENT_ID: ${HIKARI_GOOGLE_CLIENT_ID:-}
      HIKARI_GOOGLE_CLIENT_SECRET: ${HIKARI_GOOGLE_CLIENT_SECRET:-}
      HIKARI_OAUTH_REDIRECT_BASE: ${HIKARI_OAUTH_REDIRECT_BASE:-}
    volumes:
      - ctfd-uploads:/var/uploads
      - ctfd-logs:/var/log/CTFd
    depends_on:
      ctfd-permissions:
        condition: service_completed_successfully
      db:
        condition: service_healthy
      cache:
        condition: service_started
      kafka:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    networks: [hikari]

  ctfd-permissions:
    image: alpine:3.22
    command: sh -c "chown -R 1001:1001 /var/uploads /var/log/CTFd"
    volumes:
      - ctfd-uploads:/var/uploads
      - ctfd-logs:/var/log/CTFd
    networks: [hikari]

  db:
    image: mariadb:11.8
    environment:
      MARIADB_ROOT_PASSWORD: ctfd
      MARIADB_USER: ctfd
      MARIADB_PASSWORD: ctfd
      MARIADB_DATABASE: ctfd
      MARIADB_AUTO_UPGRADE: "1"
    command:
      - mariadbd
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --wait_timeout=28800
      - --max_allowed_packet=64M
    volumes:
      - mariadb-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    networks: [hikari]

  cache:
    image: redis:8.2-alpine
    volumes:
      - redis-data:/data
    networks: [hikari]

  kafka:
    image: apache/kafka:4.2.0
    environment:
      KAFKA_NODE_ID: "1"
      KAFKA_PROCESS_ROLES: controller,broker
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: "1"
      CLUSTER_ID: "hikari-local-cluster-id"
    volumes:
      - kafka-data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 18
      start_period: 45s
    networks: [hikari]

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.19.15
    environment:
      discovery.type: single-node
      cluster.routing.allocation.disk.threshold_enabled: "false"
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: "-Xms512m -Xmx1g"
    volumes:
      - es-data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9200/_cluster/health | grep -Eq '\"status\":\"(yellow|green)\"'"]
      interval: 10s
      timeout: 5s
      retries: 18
      start_period: 30s
    networks: [hikari]

  kibana:
    image: docker.elastic.co/kibana/kibana:8.19.15
    environment:
      ELASTICSEARCH_HOSTS: http://elasticsearch:9200
      SERVER_BASEPATH: /hikari/kibana
      SERVER_REWRITEBASEPATH: "true"
      SERVER_PUBLICBASEURL: http://localhost:${CTFD_PORT:-8000}/hikari/kibana
      NEWSFEED_ENABLED: "false"
      TELEMETRY_ENABLED: "false"
      TELEMETRY_OPTIN: "false"
      UISETTINGS_GLOBALOVERRIDES_HIDEANNOUNCEMENTS: "true"
      UISETTINGS_GLOBALOVERRIDES_HIDEFEEDBACK: "true"
      SECURITY_SHOWINSECURECLUSTERWARNING: "false"
      XPACK_SECURITY_ENABLED: "false"
      # Required so Kibana 8.19's Streams/alerts plugin can initialise its
      # alerts client. Without these keys, every dashboard panel renders
      # "Internal Server Error" because the Streams plugin tries to start an
      # alerts client per visualisation and fails. The keys are static for
      # the offline lab (the saved-objects store has no real secrets), so
      # they're committed alongside the rest of the local deployment.
      XPACK_ENCRYPTEDSAVEDOBJECTS_ENCRYPTIONKEY: "hikari_kibana_saved_objects_static_key_v1"
      XPACK_REPORTING_ENCRYPTIONKEY: "hikari_kibana_reporting_static_key_v1____"
      XPACK_SECURITY_ENCRYPTIONKEY: "hikari_kibana_security_static_key_v1_____"
    depends_on:
      elasticsearch:
        condition: service_healthy
    networks: [hikari]

  logstash:
    build:
      context: ./logstash
    environment:
      LS_JAVA_OPTS: "-Xms256m -Xmx512m"
    depends_on:
      elasticsearch:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks: [hikari]

  mailcatcher:
    image: haravich/fake-smtp-server
    ports:
      - "${MAIL_UI_PORT:-1080}:1080"
      - "${MAIL_SMTP_PORT:-1025}:1025"
    networks: [hikari]

volumes:
  mariadb-data:
  redis-data:
  kafka-data:
  es-data:
  ctfd-uploads:
  ctfd-logs:

networks:
  hikari:
    driver: bridge
